name: Ahmed Forex Robot Manual Run

on:
  workflow_dispatch:

jobs:
  trade_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Tools
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run Robot
        env:
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_SECRET_KEY: ${{ secrets.BINANCE_SECRET_KEY }}
          POCKET_EMAIL: ${{ secrets.POCKET_EMAIL }}
          POCKET_PASSWORD: ${{ secrets.POCKET_PASSWORD }}
        run: python Robot_main.py
