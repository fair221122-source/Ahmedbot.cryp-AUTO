app = "ahmedbot-cryp-auto"
primary_region = "iad"

[deploy]
  strategy = "immediate"

[env]
  PORT = "8080"

# هذه الإعدادات يجب أن تكون هنا (خارج services)
auto_stop_machines = false
auto_start_machines = true
min_machines_running = 1

[[services]]
  internal_port = 8080
  protocol = "tcp"

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    method = "get"
    path = "/"
    grace_period = "2m"
