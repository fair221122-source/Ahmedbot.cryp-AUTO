app = "ahmedbot-cryp-auto"
primary_region = "iad"

# هذا القسم هو المسؤول عن "قتل" التعليق
[deploy]
  strategy = "immediate"  # ينهي العملية القديمة فوراً دون انتظار

[env]
  PORT = "8080"

[[services]]
  internal_port = 8080
  protocol = "tcp"
  
  # تقليل القيود للسماح للماكينة بالاستجابة
  auto_stop_machines = false 
  auto_start_machines = true
  min_machines_running = 0 # اجعلها 0 مؤقتاً لفك التعليق ثم سنعيدها لـ 1

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    method = "get"
    path = "/"
    grace_period = "2m" # زيادة مدة السماح لدقيقتين كاملتين
