app = "ahmedbot-cryp-auto"
primary_region = "iad"

[env]
  PORT = "8080"

[[services]]
  internal_port = 8080
  protocol = "tcp"
  # منع توقف البوت آلياً لضمان عمل الرادار 24/7
  auto_stop_machines = false 
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.http_checks]]
    interval = "30s"      # الفحص كل 30 ثانية بدلاً من 15
    timeout = "5s"       # زيادة وقت انتظار الرد لـ 5 ثوانٍ
    method = "get"
    path = "/"
    grace_period = "60s" # إعطاء البوت دقيقة كاملة للإقلاع وجمع البيانات قبل الفحص
    restart_limit = 0    # منع إعادة التشغيل اللانهائي إذا تأخر الرد قليلاً
